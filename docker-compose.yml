version: '3.9'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: gabriel
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: tarefas_db
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: flask_app
    depends_on:
      - db
    ports:
      - "5000:5000"
    env_file:
      - .env